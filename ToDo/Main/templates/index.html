{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ya Mismo 1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'Main/css/styles.css' %}?v=1.1.0">
    <script src="{% static 'Main/js/theme.js' %}?v=1.1.0"></script>
</head>

<body class="preload">

    <div class="app-wrapper" id="appWrapper">
        <header class="main-header">
            <div class="header-logo">Ya Mismo</div>
            <div class="header-nav">
                <button class="nav-btn" id="reportsBtn"><i class="fa-solid fa-chart-simple"></i> Reportes</button>
                <button class="nav-btn login-btn" id="loginBtn"><i class="fa-solid fa-user"></i> Iniciar Sesión</button>
                <button id="themeToggle" class="btn-icon theme-toggle-btn" title="Cambiar tema">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </header>

        <div class="app-layout" id="appLayout">
            <div class="container" id="mainContainer">
                <h1>Tareas</h1>

                <form class="input-group" id="todoForm">
                    <input type="text" id="taskTitle" placeholder="¿Qué necesitas hacer?" required>
                    <input type="date" id="taskDate" required>
                    <textarea id="taskDesc" placeholder="Descripción de la tarea (Opcional)"></textarea>
                    <button type="submit" class="add-btn">Agregar Tarea</button>
                </form>

                <ul class="todo-list" id="todoList">
                    <!-- Tareas generadas con JS -->
                </ul>
            </div>

            <div class="detail-container" id="detailContainer">
                <div class="detail-content" id="detailContent">
                    <!-- Todo se genera dinámicamente aquí -->
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'Main/js/todo.js' %}?v=1.1.0"></script>
</body>

</html>
